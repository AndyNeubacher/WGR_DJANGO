
{% extends "base.html" %}
{% load static %}
{% block content %}
    
<p>
    <a class="btn btn-light" href="{% url 'gauge_checker_Measurement_list' %}">
    Measurement Listing
    </a>
</p>
    
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{form.errors}}
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="date_measured">date_measured: </label>
      <input class="form-control col-sm-10"
         id="date_measured" type="datetime-local"
         name="date_measured" value="{{ object.date_measured|date:'Y-m-d\TH:i' }}">
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="last_updated">last_updated: </label>
      <input class="form-control col-sm-10"
         id="last_updated" type="datetime-local"
         name="last_updated" value="{{ object.last_updated }}" disabled>
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="comments">comments: </label>
      <input class="form-control col-sm-10"
         id="comments" type="text"
         name="comments" value="{{ object.comments }}">
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="created">created: </label>
      <input class="form-control col-sm-10"
         id="created" type="datetime-local"
         name="created" value="{{ object.created }}" disabled>
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="consumed">consumed: </label>
      <input class="form-control col-sm-10"
         id="consumed" type="number"
         name="consumed" value="{{ object.consumed }}">
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="Images">Images: </label>
      {{ form.Images }}
  </div>
  <input type="submit" value="Save" class="btn btn-primary">
</form>

{% endblock %}
